<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Escolar - Login</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  background: #f4f6f8;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  width: 100vw;
}

.card {
  background: #fff;
  padding: 30px;
  border-radius: 10px;
  width: 320px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.1);
}

h2 {
  text-align: center;
  margin-bottom: 20px;
  color: #333;
}

input {
  width: 100%;
  padding: 12px;
  margin-bottom: 15px;
  border: 1px solid #ddd;
  border-radius: 5px;
  font-size: 14px;
}

input:focus {
  outline: none;
  border-color: #1e5799;
}

button {
  width: 100%;
  padding: 12px;
  background: #1e5799;
  color: #fff;
  border: none;
  border-radius: 5px;
  font-size: 16px;
  cursor: pointer;
  transition: background 0.3s;
}

button:hover {
  background: #154a80;
}

button:disabled {
  background: #ccc;
  cursor: not-allowed;
}

.error {
  color: #d32f2f;
  display: none;
  margin-top: 10px;
  font-size: 14px;
  text-align: center;
  padding: 8px;
  background: #ffebee;
  border-radius: 4px;
}

.error.show {
  display: block;
}

.success {
  color: #388e3c;
  margin-top: 10px;
  font-size: 14px;
  text-align: center;
  padding: 8px;
  background: #e8f5e9;
  border-radius: 4px;
}
</style>
</head>

<body>

<div class="card">
  <h2>🔐 Login</h2>

  <input type="email" id="login" placeholder="Digite seu email" autocomplete="email">
  <input type="password" id="senha" placeholder="Digite sua senha" autocomplete="current-password">

  <button id="btnEntrar">Entrar</button>

  <div id="errorMsg" class="error"></div>
</div>

<!-- Supabase CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>

<script>
// Configuração do Supabase - usando var para evitar redeclaração
var SUPABASE_URL = 'https://pntdrmsypgmemgwlruws.supabase.co';
var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBudGRybXN5cGdtZW1nd2xydXdzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjgyMzQ1NTgsImV4cCI6MjA4MzgxMDU1OH0.BC0iq5AfiiGSkWPMNsmco5U1sJsyEBxsRSSAspgb8IU';

// Criar cliente Supabase
var supabaseClient;

try {
  supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  console.log('Supabase inicializado com sucesso');
} catch (e) {
  console.error('Erro ao inicializar Supabase:', e);
  document.getElementById('errorMsg').innerText = 'Erro ao conectar com o servidor';
  document.getElementById('errorMsg').classList.add('show');
}

// Função de login
async function fazerLogin() {
  console.log('Tentando login...');
  
  var email = document.getElementById('login').value.trim();
  var password = document.getElementById('senha').value;
  var errorDiv = document.getElementById('errorMsg');
  var btn = document.getElementById('btnEntrar');

  // Limpar erro anterior
  errorDiv.classList.remove('show');
  errorDiv.innerText = '';

  // Validação
  if (!email) {
    errorDiv.innerText = 'Por favor, digite seu email';
    errorDiv.classList.add('show');
    return;
  }

  if (!password) {
    errorDiv.innerText = 'Por favor, digite sua senha';
    errorDiv.classList.add('show');
    return;
  }

  // Desabilitar botão
  btn.disabled = true;
  btn.innerText = 'Entrando...';

  try {
    console.log('Chamando signInWithPassword...');
    
    var { data, error } = await supabaseClient.auth.signInWithPassword({
      email: email,
      password: password
    });

    console.log('Resposta:', data, error);

    if (error) {
      console.error('Erro do Supabase:', error);
      errorDiv.innerText = 'Email ou senha incorretos';
      errorDiv.classList.add('show');
      btn.disabled = false;
      btn.innerText = 'Entrar';
    } else {
      console.log('Login bem-sucedido:', data);
      
      // Salvar sessão no localStorage se quiser
      if (data.session) {
        localStorage.setItem('supabase_session', JSON.stringify(data.session));
      }
      
      // Redirecionar
      window.location.href = 'painel.html';
    }
  } catch (err) {
    console.error('Erro inesperado:', err);
    errorDiv.innerText = 'Erro de conexão. Tente novamente.';
    errorDiv.classList.add('show');
    btn.disabled = false;
    btn.innerText = 'Entrar';
  }
}

// Event Listeners (aguardar DOM carregar)
document.addEventListener('DOMContentLoaded', function() {
  console.log('DOM carregado');
  
  var btn = document.getElementById('btnEntrar');
  var loginInput = document.getElementById('login');
  var senhaInput = document.getElementById('senha');

  // Clique no botão
  btn.addEventListener('click', fazerLogin);

  // Enter no campo de senha
  senhaInput.addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
      fazerLogin();
    }
  });

  // Enter no campo de email
  loginInput.addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
      fazerLogin();
    }
  });
});
</script>

</body>
</html>
