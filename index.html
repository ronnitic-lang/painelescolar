<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Escolar - Login</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  background: #f4f6f8;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  width: 100vw;
}

.card {
  background: #fff;
  padding: 30px;
  border-radius: 10px;
  width: 320px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.1);
}

h2 {
  text-align: center;
  margin-bottom: 20px;
  color: #333;
}

input {
  width: 100%;
  padding: 12px;
  margin-bottom: 15px;
  border: 1px solid #ddd;
  border-radius: 5px;
  font-size: 14px;
}

input:focus {
  outline: none;
  border-color: #1e5799;
}

button {
  width: 100%;
  padding: 12px;
  background: #1e5799;
  color: #fff;
  border: none;
  border-radius: 5px;
  font-size: 16px;
  cursor: pointer;
  transition: background 0.3s;
}

button:hover {
  background: #154a80;
}

button:disabled {
  background: #ccc;
  cursor: not-allowed;
}

.error {
  color: #d32f2f;
  display: none;
  margin-top: 10px;
  font-size: 14px;
  text-align: center;
  padding: 8px;
  background: #ffebee;
  border-radius: 4px;
}

.error.show {
  display: block;
}
</style>
</head>

<body>

<div class="card">
  <h2>🔐 Login</h2>

  <input type="email" id="login" placeholder="Digite seu email" autocomplete="email">
  <input type="password" id="senha" placeholder="Digite sua senha" autocomplete="current-password">

  <button id="btnEntrar">Entrar</button>

  <div id="errorMsg" class="error"></div>
</div>

<script>
// URL da sua Edge Function
const EDGE_FUNCTION_URL = 'https://pntdrmsypgmemgwlruws.supabase.co/functions/v1/login';

// Função de login
async function fazerLogin() {
  console.log('Tentando login...');
  
  const email = document.getElementById('login').value.trim();
  const password = document.getElementById('senha').value;
  const errorDiv = document.getElementById('errorMsg');
  const btn = document.getElementById('btnEntrar');

  // Limpar erro anterior
  errorDiv.classList.remove('show');
  errorDiv.innerText = '';

  // Validação
  if (!email) {
    errorDiv.innerText = 'Por favor, digite seu email';
    errorDiv.classList.add('show');
    return;
  }

  if (!password) {
    errorDiv.innerText = 'Por favor, digite sua senha';
    errorDiv.classList.add('show');
    return;
  }

  // Desabilitar botão
  btn.disabled = true;
  btn.innerText = 'Entrando...';

  try {
    console.log('Chamando Edge Function...');
    
    const response = await fetch(EDGE_FUNCTION_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({
        email: email,
        password: password
      })
    });

    const data = await response.json();
    console.log('Resposta:', data);

    if (!response.ok || data.error) {
      console.error('Erro:', data.error);
      errorDiv.innerText = data.error || 'Email ou senha incorretos';
      errorDiv.classList.add('show');
      btn.disabled = false;
      btn.innerText = 'Entrar';
    } else {
      console.log('Login bem-sucedido:', data);
      
      // Salvar sessão no localStorage
      if (data.session) {
        localStorage.setItem('supabase_session', JSON.stringify(data.session));
      }
      
      // Redirecionar
      window.location.href = 'painel.html';
    }
  } catch (err) {
    console.error('Erro inesperado:', err);
    errorDiv.innerText = 'Erro de conexão. Tente novamente.';
    errorDiv.classList.add('show');
    btn.disabled = false;
    btn.innerText = 'Entrar';
  }
}

// Event Listeners
document.addEventListener('DOMContentLoaded', function() {
  console.log('DOM carregado');
  
  const btn = document.getElementById('btnEntrar');
  const loginInput = document.getElementById('login');
  const senhaInput = document.getElementById('senha');

  btn.addEventListener('click', fazerLogin);

  senhaInput.addEventListener('keypress', function(e) {
    if (e.key === 'Enter') fazerLogin();
  });

  loginInput.addEventListener('keypress', function(e) {
    if (e.key === 'Enter') fazerLogin();
  });
});
</script>

</body>
</html>
