<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Escolar - Login</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f6f8;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0; /* Adicionado para evitar scroll */
}

.card {
  background: #fff;
  padding: 30px;
  border-radius: 10px;
  width: 300px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.1);
}

input {
  width: 100%;
  padding: 10px;
  margin-bottom: 15px;
  border: 1px solid #ddd; /* Adicionado para melhor UX */
  border-radius: 4px;
  box-sizing: border-box; /* Importante para width 100% */
}

button {
  width: 100%;
  padding: 10px;
  background: #1e5799;
  color: #fff;
  border: none;
  border-radius: 4px;
  cursor: pointer; /* Adicionado */
  transition: background 0.3s; /* Adicionado */
}

button:hover {
  background: #154a80; /* Adicionado */
}

.error {
  color: red;
  display: none;
  margin-top: 10px; /* Adicionado */
  font-size: 14px;
}
.error.show {
  display: block;
}
</style>
</head>

<body>

<div class="card">
  <h2>Login</h2>

  <input type="email" id="login" placeholder="Email">
  <input type="password" id="senha" placeholder="Senha">

  <button onclick="doLogin()">Entrar</button>

  <div id="errorMsg" class="error"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
// ✅ CORRIGIDO - sem espaços!
const supabaseUrl = 'https://pntdrmsypgmemgwlruws.supabase.co';
const supabaseKey = 'sb_publishable_BegZU19h4tkPRyuT1P9Dvw_IkO73MRh';

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

window.doLogin = async function () {
  const email = document.getElementById('login').value.trim();
  const password = document.getElementById('senha').value;
  const err = document.getElementById('errorMsg');

  // Validação básica
  if (!email || !password) {
    err.innerText = "Preencha email e senha";
    err.classList.add('show');
    return;
  }

  try {
    const { data, error } = await supabase.auth.signInWithPassword({
      email: email,
      password: password
    });

    if (error) {
      err.innerText = "Erro: " + error.message;
      err.classList.add('show');
    } else {
      // Salvar sessão se necessário
      console.log("Login OK", data);
      window.location.href = "painel.html";
    }
  } catch (e) {
    err.innerText = "Erro de conexão";
    err.classList.add('show');
    console.error(e);
  }
};

// Permitir login com Enter
document.getElementById('senha').addEventListener('keypress', function(e) {
  if (e.key === 'Enter') doLogin();
});
</script>

</body>
</html>
